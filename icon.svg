<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: dark forge glow -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C2C2E"/>
      <stop offset="50%" stop-color="#1C1C1E"/>
      <stop offset="100%" stop-color="#0D0D0F"/>
    </linearGradient>
    <!-- Forge orange glow -->
    <radialGradient id="glowOrange" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#E8620A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E8620A" stop-opacity="0"/>
    </radialGradient>
    <!-- Spark gold accent -->
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9F0A"/>
      <stop offset="100%" stop-color="#E8620A"/>
    </linearGradient>
    <!-- Viewfinder stroke gradient -->
    <linearGradient id="finderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9F0A"/>
      <stop offset="60%" stop-color="#E8620A"/>
      <stop offset="100%" stop-color="#C44D06"/>
    </linearGradient>
    <!-- Hammer head gradient -->
    <linearGradient id="hammerGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#D4D4D8"/>
      <stop offset="40%" stop-color="#A1A1AA"/>
      <stop offset="100%" stop-color="#71717A"/>
    </linearGradient>
    <!-- Hammer handle gradient -->
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>
    <!-- Drop shadow for depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <!-- Glow filter for sparks -->
    <filter id="sparkGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bgGrad)"/>

  <!-- Ambient forge glow -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#glowOrange)"/>

  <!-- Viewfinder brackets (screenshot capture symbol) -->
  <g fill="none" stroke="url(#finderGrad)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" filter="url(#dropShadow)">
    <!-- Top-left bracket -->
    <path d="M 280 380 L 280 290 Q 280 260 310 260 L 400 260"/>
    <!-- Top-right bracket -->
    <path d="M 624 260 L 714 260 Q 744 260 744 290 L 744 380"/>
    <!-- Bottom-left bracket -->
    <path d="M 280 580 L 280 670 Q 280 700 310 700 L 400 700"/>
    <!-- Bottom-right bracket -->
    <path d="M 624 700 L 714 700 Q 744 700 744 670 L 744 580"/>
  </g>

  <!-- Forge hammer (angled, resting inside viewfinder) -->
  <g transform="translate(512, 490) rotate(-35)" filter="url(#dropShadow)">
    <!-- Handle -->
    <rect x="-12" y="-20" width="24" height="200" rx="8" fill="url(#handleGrad)"/>
    <!-- Handle grip wrapping -->
    <g stroke="#78350F" stroke-width="2" opacity="0.5">
      <line x1="-12" y1="130" x2="12" y2="130"/>
      <line x1="-12" y1="145" x2="12" y2="145"/>
      <line x1="-12" y1="160" x2="12" y2="160"/>
    </g>
    <!-- Hammer head -->
    <rect x="-60" y="-70" width="120" height="55" rx="8" fill="url(#hammerGrad)"/>
    <!-- Hammer face highlight -->
    <rect x="-55" y="-65" width="110" height="6" rx="3" fill="#E4E4E7" opacity="0.6"/>
    <!-- Hammer bottom edge -->
    <rect x="-55" y="-22" width="110" height="4" rx="2" fill="#52525B" opacity="0.5"/>
  </g>

  <!-- Sparks (forge energy) -->
  <g fill="url(#sparkGrad)">
    <!-- Spark 1 -->
    <circle cx="390" cy="340" r="6" opacity="0.9"/>
    <!-- Spark 2 -->
    <circle cx="350" cy="380" r="4" opacity="0.7"/>
    <!-- Spark 3 -->
    <circle cx="420" cy="310" r="5" opacity="0.8"/>
    <!-- Spark 4 -->
    <circle cx="370" cy="300" r="3.5" opacity="0.6"/>
    <!-- Spark 5 -->
    <circle cx="440" cy="355" r="3" opacity="0.5"/>
  </g>

  <!-- Glowing spark trails -->
  <g filter="url(#sparkGlow)" opacity="0.6">
    <circle cx="390" cy="340" r="8" fill="#FF9F0A"/>
    <circle cx="420" cy="310" r="6" fill="#FF9F0A"/>
    <circle cx="350" cy="380" r="5" fill="#E8620A"/>
  </g>

  <!-- "S" lettermark in bottom area (subtle brand mark) -->
  <text x="512" y="830" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif"
        font-size="88" font-weight="700" fill="#E8620A" text-anchor="middle" opacity="0.25"
        letter-spacing="12">SNAP</text>
</svg>
